version: '3.8'

services:
  # 1. 데이터베이스 서비스 추가
  mysql:
    image: mysql:8.0.43
    container_name: pb-mysql
    restart: always
    environment:
      - TZ=Asia/Seoul
      - MYSQL_ROOT_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - MYSQL_DATABASE=pb
    # 기존 데이터 보존을 위한 볼륨 매핑
    volumes:
      - /home/ubuntu/compose/mysql_data:/var/lib/mysql
      - /etc/localtime:/etc/localtime:ro
    command:
      - --default-time-zone=+09:00
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci

  # 2. 스프링 부트 애플리케이션 서비스
  spring:
    image: ${DOCKER_USERNAME}/backoffice:latest
    container_name: spring
    restart: always
    # MySQL이 먼저 실행된 후 Spring이 뜨도록 설정
    depends_on:
      - mysql
    expose:
      - "8080"
    environment:
      - TZ=Asia/Seoul
      - JAVA_OPTS=-Xmx512M -Xms512M -Duser.timezone=Asia/Seoul
      - SPRING_PROFILES_ACTIVE=prod
      # JDBC URL의 호스트명을 컨테이너 이름인 'mysql'로 변경해야 함
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/pb?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      - SPRING_DATASOURCE_USERNAME=pbuser
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
    volumes:
      - /home/ubuntu/upload:/upload
      - /etc/localtime:/etc/localtime:ro

  # 3. 엔진엑스 프록시 서비스
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    depends_on:
      - spring
    ports:
      - "80:80"
    environment:
      - TZ=Asia/Seoul
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - /etc/localtime:/etc/localtime:ro
      - /home/ubuntu/logs:/home/ubuntu/logs
    logging:
      driver: awslogs
      options:
        awslogs-region: ap-northeast-2
        awslogs-group: spring-boot-logs
        awslogs-stream: spring-container