version: '3.8'

services:
  mysql:
    image: mysql:8.0.43
    container_name: pb-mysql
    restart: always
    environment:
      - TZ=Asia/Seoul
      - MYSQL_ROOT_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - MYSQL_DATABASE=pb
    volumes:
      - /home/ubuntu/compose/mysql_data:/var/lib/mysql
      - /etc/localtime:/etc/localtime:ro
    command:
      - --default-time-zone=+09:00
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    networks: # 추가
      - app-network

  redis:
    image: redis:alpine
    container_name: redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    restart: always
    networks: # 추가
      - app-network

  spring:
    image: ${DOCKER_USERNAME}/backoffice:latest
    container_name: spring
    restart: always
    depends_on:
      - mysql
      - redis
    expose:
      - "8080"
    environment:
      - TZ=Asia/Seoul
      - JAVA_OPTS=-Xmx512M -Xms512M -Duser.timezone=Asia/Seoul
      - SPRING_PROFILES_ACTIVE=prod
      # URL의 호스트명은 서비스 이름인 mysql이나 컨테이너 이름인 pb-mysql 모두 가능하지만, 일관성을 위해 pb-mysql 권장
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    volumes:
      - /home/ubuntu/upload:/upload
      - /etc/localtime:/etc/localtime:ro
    networks: # 추가
      - app-network

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    depends_on:
      - spring
    ports:
      - "80:80"
    environment:
      - TZ=Asia/Seoul
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - /etc/localtime:/etc/localtime:ro
      - /home/ubuntu/logs:/home/ubuntu/logs
    networks: # 추가
      - app-network

# 하단에 네트워크 브릿지 정의
networks:
  app-network:
    driver: bridge